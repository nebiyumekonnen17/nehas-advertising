<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>Nehas Advertising Legacy Player</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
      * { box-sizing: border-box; }
      #legacy-root { position: absolute; top: 0; right: 0; bottom: 40px; left: 0; overflow: hidden; background: #000; }
      #legacy-content, #legacy-content img, #legacy-content video { width: 100%; height: 100%; background: #000; }
      #legacy-content img, #legacy-content video { display: block; object-fit: contain; }
      #legacy-message { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: table; width: 100%; height: 100%; padding: 30px; text-align: center; background: #020617 url('./nehas-bg.jpg') center center / cover no-repeat; }
      #legacy-message-inner { display: table-cell; vertical-align: middle; text-shadow: 0 2px 8px #000; }
      #legacy-message h1 { margin: 0 0 12px; font-size: 40px; }
      #legacy-message p { margin: 0 auto; max-width: 700px; font-size: 20px; line-height: 1.5; }
      #legacy-footer { position: absolute; right: 0; bottom: 0; left: 0; height: 40px; padding: 0 14px; background: #05070c; border-top: 1px solid #273244; color: #fff; font-size: 13px; line-height: 40px; white-space: nowrap; }
      #legacy-footer-left { float: left; max-width: 42%; overflow: hidden; text-overflow: ellipsis; }
      #legacy-footer-right { float: right; max-width: 52%; overflow: hidden; text-overflow: ellipsis; text-align: right; }
      #legacy-pair { display: none; width: 420px; max-width: 90%; margin: 10% auto 0; padding: 28px; background: #08111f; border: 1px solid #344256; }
      #legacy-pair label { display: block; margin-bottom: 10px; color: #b8c5d6; }
      #legacy-code { width: 100%; padding: 14px; border: 1px solid #4b5d74; background: #020617; color: #fff; font-size: 28px; text-align: center; }
      #legacy-pair button { width: 100%; margin-top: 14px; padding: 14px; border: 0; background: #67e8f9; color: #07111f; font-size: 17px; font-weight: bold; }
      #legacy-error { margin-top: 12px; color: #fecaca; }
    </style>
  </head>
  <body>
    <div id="legacy-root">
      <div id="legacy-content"></div>
      <div id="legacy-message"><div id="legacy-message-inner"><h1>Nehas Advertising</h1><p id="legacy-message-text">Starting legacy player...</p></div></div>
      <form id="legacy-pair">
        <label for="legacy-code">Pairing code</label>
        <input id="legacy-code" maxlength="12" inputmode="numeric" placeholder="000000">
        <button type="submit">Pair and start playback</button>
        <div id="legacy-error"></div>
      </form>
    </div>
    <div id="legacy-footer"><span id="legacy-footer-left">Legacy player</span><span id="legacy-footer-right">This system Designed By Nebiyu Mekonnen</span></div>
    <script src="./legacy-player.js"></script>
  </body>
</html>
